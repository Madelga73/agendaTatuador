
server.port=8082

# Conexion MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/ayudante_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# logs
logging.level.org.hibernate=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.java.sql=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG

# Perfil activo: 'dev' para desarrollo (carga DataLoader) o 'test' para pruebas
spring.profiles.active=dev

# =============================================================================
# PASO 2 (Swagger): Configuracion de SpringDoc / Swagger UI
# =============================================================================
# Habilita la generacion automatica de la documentacion OpenAPI (JSON/YAML)
springdoc.api-docs.enabled=true
# Habilita la interfaz visual de Swagger UI para probar endpoints desde el navegador
springdoc.swagger-ui.enabled=true
# Ruta personalizada donde se abrira Swagger UI (http://localhost:8081/doc/swagger-ui.html)
springdoc.swagger-ui.path=/doc/swagger-ui.html


spring.application.name=AYUDANTE-SERVICE

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true