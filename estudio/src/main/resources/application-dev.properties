# Conexion a la base de datos MySQL exclusiva para desarrollo
spring.datasource.url=jdbc:mysql://localhost:3308/estudio_db
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA/Hibernate para desarrollo
# 'update' mantiene los datos entre reinicios (no borra nada)
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola para aprender y depurar
spring.jpa.show-sql=true
# Formatea el SQL para que sea mas legible
spring.jpa.properties.hibernate.format_sql=true
# Dialecto especifico de MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect