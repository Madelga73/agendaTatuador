spring.application.name=sesion
server.port=8088

# Conexion MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL del microservicio
ayudante.service.url=${AYUDANTE_SERVICE_URL}
cliente.service.url=${CLIENTE_SERVICE_URL}
estudio.service.url=${ESTUDIO_SERVICE_URL}
pago.service.url=${PAGO_SERVICE_URL}
tatuador.service.url=${TATUADOR_SERVICE_URL}
tatuaje.service.url=${TATUAJE_SERVICE_URL}

# logs
logging.level.org.hibernate=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.java.sql=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG