# Conexion a base de datos H2 en memoria (solo existe mientras corren los tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Configuracion de JPA/Hibernate para tests
# 'create-drop' crea las tablas al iniciar y las borra al finalizar
spring.jpa.hibernate.ddl-auto=create-drop
# Muestra las consultas SQL en la consola (util para ver que pasa en los tests)
spring.jpa.show-sql=true
# Formatea el SQL para que sea mas legible
spring.jpa.properties.hibernate.format_sql=true
# Dialecto de H2 (compatible con la sintaxis que usa Hibernate)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect